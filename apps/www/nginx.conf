# MEMPAS frontend nginx config
# - serves the Vue SPA at /
# - reverse-proxies /api/* to the backend container (service name `backend`)
# - sensible upload limit for OCR uploads (10 MB)

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # OCR uploads up to 10 MB (PDF / image scans)
    client_max_body_size 10M;

    # Gzip static assets
    gzip on;
    gzip_types text/plain text/css text/javascript application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Static SPA — fall through to index.html for client-side routing
    location / {
        try_files $uri $uri/ /index.html;
        # Aggressive caching for hashed assets
        location /assets/ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # Reverse proxy /api/* to the backend container.
    # Long timeouts: a multi-page Qwen-VL extraction can legitimately
    # take 30–60 seconds end-to-end (though the upload itself returns
    # in <1 s — the polling endpoint is what carries the long waits).
    location /api/ {
        proxy_pass         http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_buffering    off;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }
}
